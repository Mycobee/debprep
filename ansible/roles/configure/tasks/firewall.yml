---
- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: true

- name: Set default policy for incoming traffic
  community.general.ufw:
    default: deny
    direction: incoming
    state: enabled
    logging: true

- name: Set default policy for outgoing traffic
  community.general.ufw:
    default: allow
    direction: outgoing
    state: enabled
    logging: true

- name: Rate-limit SSH
  community.general.ufw:
    rule: limit
    port: "{{ ssh_port | default(22) }}"
    proto: tcp
    direction: in

- name: Allow inbound traffic for specified TCP ports
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
    direction: in
  loop: "{{ allowed_inbound_tcp_ports | default([80, 443]) }}"

- name: Allow specified inbound UDP ports if defined
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: udp
    direction: in
  loop: "{{ allowed_inbound_udp_ports | default([]) }}"
  when: allowed_inbound_udp_ports is defined and allowed_inbound_udp_ports | length > 0
