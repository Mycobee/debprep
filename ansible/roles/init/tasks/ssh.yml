---
- name: Write hardened SSH config drop-in
  ansible.builtin.copy:
    content: |
      PermitRootLogin no
      PasswordAuthentication no
      KbdInteractiveAuthentication no
    dest: /etc/ssh/sshd_config.d/99-debprep.conf
    owner: root
    group: root
    mode: "0644"
    validate: "sshd -t -f %s"
  notify: Restart sshd
